/* ===========================
   BASE RESET
   =========================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

}

}

img, picture, video, svg { display: block; max-width: 100%; height: auto; }

}

}

.sr-only {

.nav {

}

}

}
.nav-links a {

}
.nav-links a:hover { color: var(--color-primary); }

.lang-switcher {
  display: flex;

/* Hamburger */
.hamburger {
  display: none;
  width: 44px;
  height: 44px;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  transition: background var(--transition-interactive);
}
.hamburger:hover { background: var(--color-surface-2); }
.hamburger span {
  display: block;
  width: 20px;
  height: 2px;
  background: var(--color-text);
  transition: all var(--transition-interactive);
  position: relative;
}
.hamburger span::before,
.hamburger span::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 2px;
  background: var(--color-text);
  left: 0;
  transition: all var(--transition-interactive);
}
.hamburger span::before { top: -6px; }
.hamburger span::after { top: 6px; }
.hamburger.open span { background: transparent; }
.hamburger.open span::before { top: 0; transform: rotate(45deg); }
.hamburger.open span::after { top: 0; transform: rotate(-45deg); }

/* Mobile menu */
.mobile-menu {
  display: none;
  position: fixed;
  top: var(--nav-height);
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(16px);
  z-index: 99;
  padding: var(--space-8) var(--space-6);
  flex-direction: column;
  gap: var(--space-6);
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.mobile-menu.open {
  display: flex;
  opacity: 1;
  transform: translateY(0);
}
.mobile-menu a {
  font-size: var(--text-lg);
  font-weight: 500;
  color: var(--color-text);
  padding: var(--space-2) 0;
  border-bottom: 1px solid var(--color-divider);
}
.mobile-menu a:hover { color: var(--color-primary); }
.mobile-lang {

}

/* ===========================

}

.services-grid {
  max-width: var(--content-wide);

.service-card {

}
.service-card:hover {

.service-card-header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}
.service-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);

  font-size: var(--text-base);

  font-weight: 700;
  color: var(--color-text);
}
.service-items {
  list-style: none;
  padding-left: var(--space-4);
}
.service-items li {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  padding: var(--space-1) 0;
  position: relative;
  line-height: 1.5;
}
.service-items li::before {
  content: '•';
  position: absolute;
  left: calc(-1 * var(--space-3));
  color: var(--color-accent);
  font-weight: 700;
}
[dir="rtl"] .service-items {
  padding-left: 0;
  padding-right: var(--space-4);
}
[dir="rtl"] .service-items li::before {
  left: auto;
  right: calc(-1 * var(--space-3));
}

/* ===========================
   ABOUT SECTION

  let currentLang = 'ru';

  function setLanguage(lang) {
    currentLang = lang;
    const t = siteData.translations[lang];
    const root = document.documentElement;
    root.setAttribute('lang', lang);
    root.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
    document.getElementById('nav-brand-text').textContent = t.navTitle;
    document.querySelectorAll('[data-i18n="nav-services"]').forEach(el => el.textContent = t.navServices);
    document.querySelectorAll('[data-i18n="nav-about"]').forEach(el => el.textContent = t.navAbout);
    document.querySelectorAll('[data-i18n="nav-contact"]').forEach(el => el.textContent = t.navContact);
    document.querySelectorAll('[data-i18n="skip"]').forEach(el => el.textContent = t.skip);
    document.querySelector('.hero-label').textContent = t.heroLabel;
    document.getElementById('hero-title').textContent = t.heroTitle;
    document.getElementById('hero-subtitle').textContent = t.heroSubtitle;
    document.getElementById('hero-photo').alt = t.imgAlt;
    document.querySelectorAll('[data-i18n="callNow"]').forEach(el => el.textContent = t.callNow);
    document.querySelectorAll('[data-i18n="bookAppointment"]').forEach(el => el.textContent = t.bookAppointment);
    const statsContainer = document.getElementById('stats-container');
    statsContainer.innerHTML = t.stats.map(s => `<div class="stat-item"><div class="stat-number" data-target="${s.number}">${s.number}</div><div class="stat-text">${s.text}</div></div>`).join('');
    document.getElementById('services-title').textContent = t.servicesTitle;
    document.getElementById('services-grid').innerHTML = t.services.map(service => `<article class="service-card reveal"><div class="service-card-header"><div class="service-icon"><i class="fas ${service.icon}"></i></div><h3>${service.title}</h3></div><ul class="service-items" role="list">${service.items.map(item => `<li>${item}</li>`).join('')}</ul></article>`).join('');
    document.getElementById('about-title').textContent = t.aboutTitle;
    document.getElementById('about-content').innerHTML = t.aboutContent.map(p => `<p>${p}</p>`).join('');
    document.getElementById('contact-title').textContent = t.contactTitle;
    document.getElementById('contact-address').textContent = t.contactAddress;
    document.querySelectorAll('[data-i18n="contact-address-label"]').forEach(el => el.textContent = t.contactAddressLabel);
    document.querySelectorAll('[data-i18n="contact-phone-label"]').forEach(el => el.textContent = t.contactPhoneLabel);
    document.querySelectorAll('[data-i18n="contact-hours-label"]').forEach(el => el.textContent = t.contactHoursLabel);
    document.querySelectorAll('[data-i18n="contact-hours-value"]').forEach(el => el.textContent = t.contactHoursValue);
    document.getElementById('footer-credentials').innerHTML = t.footerLines.map(line => `<p>${line}</p>`).join('');
    document.getElementById('social-text').textContent = t.socialText;
    document.getElementById('footer-copyright').textContent = t.footerLines[0];
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
    initScrollReveals();
    initCountUp();
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      setLanguage(btn.dataset.lang);
      const mobileMenu = document.getElementById('mobile-menu');
      const hamburger = document.querySelector('.hamburger');
      if (mobileMenu.classList.contains('open')) {
        mobileMenu.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
      }
    });
  });

  const hamburger = document.querySelector('.hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  hamburger.addEventListener('click', () => {
    const isOpen = mobileMenu.classList.toggle('open');
    hamburger.classList.toggle('open');
    hamburger.setAttribute('aria-expanded', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  });
  document.querySelectorAll('.mobile-nav-link').forEach(link => {
    link.addEventListener('click', () => {
      mobileMenu.classList.remove('open');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    });
  });

  const nav = document.querySelector('.nav');
  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    nav.classList.toggle('scrolled', scrollY > 10);
    document.getElementById('back-to-top').classList.toggle('visible', scrollY > 600);
  }, { passive: true });

  window.openLightbox = function() {
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  window.closeLightbox = function() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  };
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeLightbox();
      if (mobileMenu.classList.contains('open')) {
        mobileMenu.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
      }
    }
  });

  function initScrollReveals() {
    const reveals = document.querySelectorAll('.reveal:not(.visible)');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    reveals.forEach(el => observer.observe(el));
  }

  function initCountUp() {
    const statNumbers = document.querySelectorAll('.stat-number');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const target = el.dataset.target;
          const numMatch = target.match(/(\d+)/);
          if (numMatch) {
            const num = parseInt(numMatch[1]);
            const suffix = target.replace(numMatch[1], '');
            let current = 0;
            const step = Math.ceil(num / 40);
            const interval = setInterval(() => {
              current += step;
              if (current >= num) { current = num; clearInterval(interval); }
              el.textContent = current + suffix;
            }, 30);
          }
          observer.unobserve(el);
        }
      });
    }, { threshold: 0.5 });
    statNumbers.forEach(el => observer.observe(el));
  }

  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      const href = this.getAttribute('href');
      if (href === '#') return;
      const target = document.querySelector(href);
      if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth' }); }
    });
  });

  setLanguage('ru');

})();
